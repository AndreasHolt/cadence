log:
  stdout: true
  level: info

persistence:
  defaultStore: cass-default
  visibilityStore: cass-visibility
  numHistoryShards: 4
  datastores:
    cass-default:
      nosql:
        pluginName: "cassandra"
        hosts: "cassandra"
        keyspace: "cadence"
        connectTimeout: 2s
        timeout: 5s
        consistency: LOCAL_QUORUM
        serialConsistency: LOCAL_SERIAL
    cass-visibility:
      nosql:
        pluginName: "cassandra"
        hosts: "cassandra"
        keyspace: "cadence_visibility"
        connectTimeout: 2s
        timeout: 5s
        consistency: LOCAL_QUORUM
        serialConsistency: LOCAL_SERIAL

ringpop:
  name: cadence
  broadcastAddress: ${POD_IP}
  bootstrapMode: hosts
  bootstrapHosts:
    - cadence-frontend-0.cadence-frontend-headless:7933
    - cadence-history-0.cadence-history-headless:7934
    - cadence-matching-a-0.cadence-matching-a-headless:7935
    - cadence-matching-b-0.cadence-matching-b-headless:7935
    - cadence-matching-c-0.cadence-matching-c-headless:7935
    - cadence-shard-distributor-0.cadence-shard-distributor-headless:7941
  maxJoinDuration: 30s

services:
  frontend:
    rpc:
      port: 7933
      grpcPort: 7833
      bindOnIP: ${POD_IP}
      grpcMaxMsgSize: 33554432
    metrics:
      prometheus:
        timerType: histogram
        listenAddress: 0.0.0.0:9090
    pprof:
      port: 7936
      host: 0.0.0.0

  matching:
    rpc:
      port: 7935
      grpcPort: 7835
      bindOnIP: ${POD_IP}
      grpcMaxMsgSize: 33554432
    metrics:
      prometheus:
        timerType: histogram
        listenAddress: 0.0.0.0:9090
    pprof:
      port: 7938
      host: 0.0.0.0

  history:
    rpc:
      port: 7934
      grpcPort: 7834
      bindOnIP: ${POD_IP}
      grpcMaxMsgSize: 33554432
    metrics:
      prometheus:
        timerType: histogram
        listenAddress: 0.0.0.0:9090
    pprof:
      port: 7937
      host: 0.0.0.0

  shard-distributor:
    rpc:
      port: 7941
      grpcPort: 7943
      bindOnIP: ${POD_IP}
      grpcMaxMsgSize: 33554432
    metrics:
      prometheus:
        timerType: histogram
        listenAddress: 0.0.0.0:9090
    pprof:
      port: 7942
      host: 0.0.0.0

clusterGroupMetadata:
  failoverVersionIncrement: 10
  primaryClusterName: cluster0
  currentClusterName: cluster0
  clusterGroup:
    cluster0:
      enabled: true
      initialFailoverVersion: 0
      newInitialFailoverVersion: 1
      rpcAddress: cadence-frontend:7833
      rpcTransport: grpc

publicClient:
  hostPort: cadence-frontend:7833

archival:
  history:
    status: disabled
    enableRead: false
    provider:
      filestore:
        fileMode: "0666"
        dirMode: "0766"
  visibility:
    status: disabled
    enableRead: false
    provider:
      filestore:
        fileMode: "0666"
        dirMode: "0766"

domainDefaults:
  archival:
    history:
      status: disabled
      URI: ""
    visibility:
      status: disabled
      URI: ""

dynamicconfig:
  client: filebased
  filebased:
    filepath: /etc/cadence/config/dynamicconfig/kind-lab.yaml
    pollInterval: 10s

blobstore:
  filestore:
    outputDirectory: /tmp/blobstore

shardDistributorClient:
  hostPort: cadence-shard-distributor:7943

shardDistribution:
  election:
    leaderPeriod: 30s
    maxRandomDelay: 5s
    failedElectionCooldown: 5s
  namespaces:
    - name: cadence-matching-kind-lab
      type: fixed
      shardNum: 1000
      mode: onboarded
  leaderStore:
    storageParams:
      endpoints: [etcd:2379]
      dialTimeout: 1s
      prefix: leader
  store:
    storageParams:
      endpoints: [etcd:2379]
      dialTimeout: 1s
      prefix: store
  process:
    period: 1s
    heartbeatTTL: 10s

shard-distributor-matching:
  namespaces:
    - namespace: cadence-matching-kind-lab
      heartbeat_interval: 1s
      migration_mode: onboarded
      ttl_shard: 5m
      ttl_report: 5s
