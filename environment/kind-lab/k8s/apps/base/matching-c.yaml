apiVersion: v1
kind: Service
metadata:
  name: cadence-matching-c-headless
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: matching
    app.kubernetes.io/instance: matching-c
  ports:
    - name: grpc
      port: 7835
      targetPort: 7835
    - name: rpc
      port: 7935
      targetPort: 7935
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cadence-matching-c
spec:
  serviceName: cadence-matching-c-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: matching
      app.kubernetes.io/instance: matching-c
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadence-kind-lab
        app.kubernetes.io/part-of: cadence-kind-lab
        app.kubernetes.io/component: matching
        app.kubernetes.io/instance: matching-c
    spec:
      containers:
        - name: matching
          image: cadence-kind-lab:dev
          imagePullPolicy: Never
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MATCHING_LAB_ADD_TASK_CPU_BURN_ITERATIONS
              value: "0"
          command:
            - cadence-server
            - --root
            - /etc/cadence
            - --env
            - kind-lab
            - start
            - --services=matching
          ports:
            - containerPort: 7835
              name: grpc
            - containerPort: 7935
              name: rpc
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: 1000m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 7835
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7835
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: cadence-config
              mountPath: /etc/cadence/config/kind-lab.yaml
              subPath: kind-lab.yaml
            - name: cadence-config
              mountPath: /etc/cadence/config/dynamicconfig/kind-lab.yaml
              subPath: kind-lab-dynamic.yaml
      volumes:
        - name: cadence-config
          configMap:
            name: cadence-kind-lab-config
