apiVersion: v1
kind: Service
metadata:
  name: cadence-shard-distributor
spec:
  selector:
    app.kubernetes.io/component: shard-distributor
  ports:
    - name: grpc
      port: 7943
      targetPort: 7943
    - name: rpc
      port: 7941
      targetPort: 7941
---
apiVersion: v1
kind: Service
metadata:
  name: cadence-shard-distributor-headless
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: shard-distributor
  ports:
    - name: grpc
      port: 7943
      targetPort: 7943
    - name: rpc
      port: 7941
      targetPort: 7941
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cadence-shard-distributor
spec:
  serviceName: cadence-shard-distributor-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: shard-distributor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadence-kind-lab
        app.kubernetes.io/part-of: cadence-kind-lab
        app.kubernetes.io/component: shard-distributor
    spec:
      containers:
        - name: shard-distributor
          image: cadence-kind-lab:dev
          imagePullPolicy: Never
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command:
            - cadence-server
            - --root
            - /etc/cadence
            - --env
            - kind-lab
            - start
            - --services=shard-distributor
          ports:
            - containerPort: 7943
              name: grpc
            - containerPort: 7941
              name: rpc
            - containerPort: 9090
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 7943
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7943
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: cadence-config
              mountPath: /etc/cadence/config/kind-lab.yaml
              subPath: kind-lab.yaml
            - name: cadence-config
              mountPath: /etc/cadence/config/dynamicconfig/kind-lab.yaml
              subPath: kind-lab-dynamic.yaml
      volumes:
        - name: cadence-config
          configMap:
            name: cadence-kind-lab-config
