apiVersion: v1
kind: Service
metadata:
  name: cassandra
spec:
  selector:
    app.kubernetes.io/component: cassandra
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: cassandra
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cassandra
        app.kubernetes.io/name: cadence-kind-lab
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1.1
          ports:
            - containerPort: 9042
              name: cql
          env:
            - name: MAX_HEAP_SIZE
              value: 8G
            - name: HEAP_NEWSIZE
              value: 2G
          readinessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 180
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: 9042
            failureThreshold: 30
            periodSeconds: 10
