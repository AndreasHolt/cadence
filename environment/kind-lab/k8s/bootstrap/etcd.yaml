apiVersion: v1
kind: Service
metadata:
  name: etcd
spec:
  selector:
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/component: etcd
        app.kubernetes.io/name: cadence-kind-lab
    spec:
      containers:
        - name: etcd
          image: bitnamilegacy/etcd:3.5.5
          env:
            - name: ALLOW_NONE_AUTHENTICATION
              value: "yes"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: http://etcd:2379
          ports:
            - containerPort: 2379
              name: client
          readinessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 15
            periodSeconds: 10
