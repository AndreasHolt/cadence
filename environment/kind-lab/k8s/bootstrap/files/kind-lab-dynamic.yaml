frontend.enableClientVersionCheck:
  - value: true
matching.enableClientAutoConfig:
  - value: true
history.useNewInitialFailoverVersion:
  - value: true
matching.shardDistributionMode:
  - value: shard_distributor
matching.percentageOnboardedToShardManager:
  - value: 100
matching.qpsTrackerInterval:
  - value: 1s
shardDistributor.migrationMode:
  - value: onboarded
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingMode:
  - value: greedy
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.moveBudgetProportion:
  - value: 0.01
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.hysteresisUpperBand:
  - value: 1.15
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.hysteresisLowerBand:
  - value: 0.9
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.severeImbalanceRatio:
  - value: 1.3
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.perShardCooldown:
  - value: 3m
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.heterogeneityMode:
  - value: off
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.moveScoringMode:
  - value: benefit
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.movePenaltyCoefficient:
  - value: 0.2
    constraints:
      namespace: cadence-matching-kind-lab
shardDistributor.loadBalancingGreedy.cpuSecondsSmoothingTau:
  - value: 10m
    constraints:
      namespace: cadence-matching-kind-lab
matching.enableAdaptiveScaler:
  - value: false
    constraints:
      namespace: cadence-matching-kind-lab
matching.numTasklistReadPartitions:
  - value: 1
    constraints:
      namespace: cadence-matching-kind-lab
matching.numTasklistWritePartitions:
  - value: 1
    constraints:
      namespace: cadence-matching-kind-lab
