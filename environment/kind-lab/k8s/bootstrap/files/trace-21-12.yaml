frontend_grpc_endpoint: cadence-frontend:7833
matching_grpc_endpoint: cadence-matching:7835
matching_peers:
  - cadence-matching-a-0.cadence-matching-a-headless
  - cadence-matching-b-0.cadence-matching-b-headless
  - cadence-matching-c-0.cadence-matching-c-headless
domain: cadence-matching-kind-lab
retention_days: 1
poll_timeout: 15s
summary_interval: 10s
trace:
  path: /etc/cadence/kind-lab/traces/21-12_00-06_fixed.csv
  interval: 10s
  qps_scale: 1.0
  qps_scale_ramp:
    start: 0.1
    end: 1.0
  time_scale: 1
  top_n: 1000
  start_row: 0
  rows: 180
  poller_capacity_qps: 50
  start_workers: 512
  process_time: 0s
