apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cadence-kind-lab
resources:
  - namespace.yaml
  - cassandra.yaml
  - etcd.yaml
  - schema-job.yaml
configMapGenerator:
  - name: cadence-kind-lab-config
    files:
      - kind-lab.yaml=files/kind-lab.yaml
      - kind-lab-dynamic.yaml=files/kind-lab-dynamic.yaml
      - hotspot.yaml=files/hotspot.yaml
      - trace-21-12.yaml=files/trace-21-12.yaml
generatorOptions:
  disableNameSuffixHash: true
