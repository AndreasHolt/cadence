apiVersion: batch/v1
kind: Job
metadata:
  name: matching-lab
  namespace: cadence-kind-lab
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matching-lab
        app.kubernetes.io/part-of: cadence-kind-lab
    spec:
      restartPolicy: Never
      containers:
        - name: matching-lab
          image: cadence-kind-lab:dev
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - >
              LOGFILE="/tmp/matching-lab-${SCENARIO}-$(date +%s).log"
              && cadence-matching-lab
              --config "/etc/cadence/kind-lab/${SCENARIO}.yaml"
              --metrics-endpoints "http://cadence-shard-distributor-0.cadence-shard-distributor-headless:9090/metrics"
              > "$LOGFILE" 2>&1
              ; cat "$LOGFILE"
          env:
            - name: SCENARIO
              value: hotspot
          volumeMounts:
            - name: cadence-config
              mountPath: /etc/cadence/kind-lab/hotspot.yaml
              subPath: hotspot.yaml
            - name: cadence-config
              mountPath: /etc/cadence/kind-lab/trace-21-12.yaml
              subPath: trace-21-12.yaml
      volumes:
        - name: cadence-config
          configMap:
            name: cadence-kind-lab-config
