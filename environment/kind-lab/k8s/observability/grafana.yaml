apiVersion: v1
kind: ConfigMap
metadata:
  name: kind-lab-grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kind-lab-grafana-dashboards-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: kind-lab
        orgId: 1
        folder: Cadence Kind Lab
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
---
