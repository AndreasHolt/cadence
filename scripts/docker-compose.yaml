services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # Mounts your custom config file
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Persistent storage for metrics data
      - prometheus_data:/prometheus
    command:
      # Tell Prometheus to use the mounted config file
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Keep Prometheus listening on 9090 inside the container
      - '--web.enable-lifecycle' # Allows config reload without restart
    network_mode: host
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      # Persistent storage for Grafana settings, dashboards, etc.
      - grafana_data:/var/lib/grafana
    network_mode: host
    restart: unless-stopped

volumes:
  prometheus_data: {}
  grafana_data: {}
